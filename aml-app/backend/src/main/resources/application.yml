server:
  port: 8080

# ─────────────────────────────────────────────
# 기본 프로필: H2 인메모리 (개발/로컬 실행용)
# Oracle 사용: --spring.profiles.active=oracle
# ─────────────────────────────────────────────
spring:
  profiles:
    active: default

  datasource:
    # H2: AMLXpress7 운영 Oracle SQL과 최대한 유사하게 LEGACY 모드 유지
    # Oracle Docker 사용 시 application-oracle.yml 로 오버라이드됨
    url: jdbc:h2:mem:amldb;DB_CLOSE_DELAY=-1;MODE=LEGACY;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console   # http://localhost:8080/h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.aml: DEBUG
    org.mybatis: DEBUG
