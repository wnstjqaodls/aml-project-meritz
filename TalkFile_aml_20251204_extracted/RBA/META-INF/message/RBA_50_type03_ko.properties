RBA_50_01_01_229=내·외부 금융사고 이력이 있는가?
RBA_50_01_01_230=자금세탁과 관련된 금융사고 발생과 관련된 업무 식별
RBA_50_01_01_231=규정 및 지침을 통해 요구되는 자금세탁관련 통제활동인가?
