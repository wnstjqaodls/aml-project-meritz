RBA_50_01_01_206=※총위험평가 수행은 총위험평가 배치실행완료 후에만 재수행 가능합니다.
RBA_50_01_01_207=※잔여위험평가가 완료된 후 총위험평가 재수행 시는 잔여위험평가까지 재수행 됩니다.
RBA_50_01_01_208=※통제평가 재수행은 배치실행이 완료되어도 가능하며 잔여위험평가가 다시 재수행됩니다.
RBA_50_01_01_209=※배치 재수행은 위험수기평가가 변경되거나 통제평가 수기처리가 변경될 때만 수행하시면 됩니다.
RBA_50_01_01_210=잔여위험 배치가 수행되지 않은 상태에서 수행할 수 없습니다.
RBA_50_01_01_211=총 위험평가 배치가 수행되지 않은 상태에서 수행할 수 없습니다.
RBA_50_01_01_212=※ 본점책임자는 준법감시인 , 본점담당자는 법규준수팀의 AML/RBA담당자 , 그 외 본부부서 및 영업점은 지점담당자와 지점책임자 권한 부여
RBA_50_01_01_213=※ 총위험 평가 방식(자동평가/수기평가)은 배치가 수행되어야 반영됩니다.
RBA_50_01_01_214=※ 총위험 평가 방식이 '수기'에서 '자동'으로 변경할 경우 IT와의 혐의가 필요합니다.
RBA_50_01_01_215=※ 업무프로세스 관리 배치처리일 작성 후에는 수정 불가능 합니다.
