#20190613 MYSQL 사용여부
DB_MYSQL_YN=N
#20210602 DBType 설정 : ORACLE, MYSQL, POSTGRE
DBTYPE=ORACLE

#SQL Injection 특수문자 특수구분 필터링 기능
SQL_INJECTION_YN=N
#AML로그인 시 장기 미사용자 검증 시 사용(미사용기간설정 : 90일)
LAST_LOGIN_CHK=90

#2023.02.06 구글OTP사용여부(Y/N으로 설정)
